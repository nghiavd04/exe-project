spring.application.name=backend

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/exe_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JWT Configuration
jwt.secret=${JWT_SECRET:SIQjsUC1rX3x1wCDjoUnk6TRjmvWeVfRMirBGDWPQW4=}
jwt.expiration=86400000

# Frontend URL (for OAuth2 redirect)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
spring.mail.properties.mail.smtp.localaddress=0.0.0.0
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM:nghia0962795664@gmail.com}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# PayOS Configuration
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}

app.payment.return-url=${PAYMENT_RETURN_URL:http://localhost:5173/payment-success}
app.payment.cancel-url=${PAYMENT_CANCEL_URL:http://localhost:5173/payment-cancel}
app.payment.expiry-minutes=${PAYMENT_EXPIRY_MINUTES:15}

# Multipart upload limits (Audio/Video support)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB

# Gemini AI API Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.keys=${GEMINI_API_KEYS:}
gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
gemini.model.fallbacks=${GEMINI_MODEL_FALLBACKS:-gemini-2.5-flash,gemini-3.1-flash-lite,gemini-3.0-flash}

# Gemini Retry Configuration
gemini.retry.max-attempts=${GEMINI_RETRY_MAX_ATTEMPTS:3}
gemini.retry.initial-delay-ms=${GEMINI_RETRY_INITIAL_DELAY_MS:1000}

# Gemini Rate Limiting (per user per minute)
gemini.rate-limit.requests-per-minute=${GEMINI_RATE_LIMIT_RPM:10}
